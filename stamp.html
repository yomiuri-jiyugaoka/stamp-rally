<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタンプを押す - よみうりカルチャー自由が丘</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');
  :root { --primary: #FF6B35; --accent: #4ECDC4; --bg: #FFF9F0; --card: #FFFFFF; --text: #2D2D2D; --muted: #888; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Kosugi Maru', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background-image: radial-gradient(circle at 20% 20%, #FFE0D0 0%, transparent 50%), radial-gradient(circle at 80% 80%, #D0F5F2 0%, transparent 50%); }
  .container { width: 100%; max-width: 420px; }
  .card { background: var(--card); border-radius: 24px; padding: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); text-align: center; }

  /* はんこ風スタンプアイコン */
  .stamp-icon { font-size: 80px; margin-bottom: 16px; display: inline-block; filter: drop-shadow(0 4px 8px rgba(255,107,53,0.3)); }
  .stamp-icon.stamping { animation: stampPress 0.5s ease forwards; }
  @keyframes stampPress {
    0% { transform: scale(1) rotate(0deg); }
    30% { transform: scale(1.4) rotate(-5deg); filter: drop-shadow(0 8px 16px rgba(255,107,53,0.6)); }
    50% { transform: scale(0.9) rotate(2deg); }
    70% { transform: scale(1.1) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* はんこの印影エフェクト */
  .ink-effect { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(255,107,53,0.4) 0%, transparent 70%); pointer-events: none; z-index: 50; display: none; animation: inkSpread 0.6s ease forwards; }
  @keyframes inkSpread { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(-50%,-50%) scale(3);opacity:0} }

  .course-name { font-size: 20px; font-weight: bold; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .course-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .nickname-display { font-size: 28px; font-weight: bold; color: var(--primary); margin: 16px 0; }
  input[type="text"] { width: 100%; padding: 16px; border: 2px solid #EEE; border-radius: 12px; font-size: 20px; font-family: 'Kosugi Maru', sans-serif; color: var(--text); outline: none; margin-bottom: 16px; text-align: center; }
  input[type="text"]:focus { border-color: var(--primary); }
  .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 18px; font-family: 'Kosugi Maru', sans-serif; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 0 #CC4A1A; }
  .btn-accent { background: var(--accent); color: white; box-shadow: 0 4px 0 #2EA89F; }
  .btn-gray { background: #F0F0F0; color: var(--muted); font-size: 14px; }
  .error { background: #FFF0F0; border: 1px solid #FFCCCC; color: #CC3333; padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 12px; display: none; }
  .loading { color: var(--muted); font-size: 14px; margin-bottom: 12px; display: none; }

  /* 成功画面 */
  .success-screen { display: none; }
  .success-stamp { font-size: 100px; display: inline-block; animation: successStamp 0.8s ease forwards; }
  @keyframes successStamp {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    50% { transform: scale(1.3) rotate(5deg); opacity: 1; }
    70% { transform: scale(0.9) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .success-text { font-size: 26px; font-weight: bold; color: var(--primary); margin: 16px 0 8px; }
  .success-count { font-size: 18px; color: var(--muted); margin-bottom: 8px; }
  .success-sub { font-size: 16px; color: var(--muted); margin-bottom: 24px; }

  /* スタンプ数バッジ */
  .stamp-count-badge { display: inline-block; background: linear-gradient(135deg, #FF6B35, #FF8C5A); color: white; border-radius: 50px; padding: 8px 24px; font-size: 22px; font-weight: bold; margin: 8px 0 16px; box-shadow: 0 4px 0 #CC4A1A; }

  /* 達成バナー */
  .achievement-banner { border-radius: 16px; padding: 16px; margin-bottom: 16px; animation: achieveBounce 0.6s ease; }
  @keyframes achieveBounce { 0%{transform:scale(0)} 60%{transform:scale(1.1)} 100%{transform:scale(1)} }
  .achievement-3 { background: linear-gradient(135deg, #FFD700, #FFA500); }
  .achievement-5 { background: linear-gradient(135deg, #4ECDC4, #44A8A0); }
  .achievement-icon { font-size: 36px; margin-bottom: 4px; }
  .achievement-text { font-size: 18px; font-weight: bold; color: white; }
  .achievement-sub { font-size: 13px; color: rgba(255,255,255,0.9); }

  /* 済みスタンプ画面 */
  .already-screen { display: none; }
  .already-icon { font-size: 80px; margin-bottom: 16px; filter: grayscale(1); opacity: 0.5; }
  .already-badge { display: inline-block; background: #CCC; color: white; border-radius: 50px; padding: 8px 24px; font-size: 18px; font-weight: bold; margin: 8px 0 16px; }
  .already-text { font-size: 20px; font-weight: bold; color: #999; margin-bottom: 8px; }
  .already-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .card.already { background: #F5F5F5; border: 2px solid #DDD; }

  /* 紙吹雪 */
  .confetti-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 100; overflow: hidden; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; top: -10px; }
  @keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div class="ink-effect" id="inkEffect"></div>
<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <div class="card" id="mainCard">
    <div class="stamp-icon" id="stampIcon">🎯</div>
    <div class="course-name" id="courseName">講座名を読み込み中...</div>
    <div class="course-sub">この講座に参加したね！</div>

    <div id="confirmSection" style="display:none">
      <div style="font-size:14px;color:var(--muted);margin-bottom:8px">あなたはこの人ですか？</div>
      <div class="nickname-display" id="savedNicknameDisplay"></div>
      <button class="btn btn-primary" onclick="stampWithSaved()">✅ はい！スタンプを押す</button>
      <button class="btn btn-gray" onclick="showInputSection()">別の人です</button>
    </div>

    <div id="inputSection" style="display:none">
      <div style="font-size:14px;color:var(--muted);margin-bottom:8px">ニックネームを入力してね</div>
      <div class="error" id="stampError"></div>
      <div class="loading" id="stampLoading">⏳ 確認中...</div>
      <input type="text" id="nicknameInput" placeholder="例：たろう">
      <button class="btn btn-accent" onclick="stampWithInput()">🌟 スタンプを押す！</button>
    </div>

    <!-- 済み画面 -->
    <div class="already-screen" id="alreadyScreen">
      <div class="already-icon">🎯</div>
      <div class="already-text">このスタンプはすでに押してあるよ！</div>
      <div class="already-badge">✅ 済み</div>
      <div class="already-sub" id="alreadyCourseName"></div>
      <button class="btn btn-gray" onclick="resetScreen()">🔄 やり直す</button>
      <button class="btn btn-primary" onclick="goMypage()">📱 マイページを見る</button>
    </div>

    <div class="success-screen" id="successScreen">
      <div class="success-stamp" id="successStampIcon">🌟</div>
      <div class="success-text" id="successText">スタンプを押したよ！</div>
      <div class="stamp-count-badge" id="stampCountBadge">1個</div>
      <div id="achievementBanner"></div>
      <div class="success-sub" id="successSub"></div>
      <button class="btn btn-primary" onclick="goMypage()">📱 マイページを見る</button>
      <button class="btn btn-gray" onclick="location.href='index.html'">トップへ戻る</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://xxtqlxfknmbbfjdidjjl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4dHFseGZrbm1iYmZqZGlkampsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzM5MjIsImV4cCI6MjA5NjMwOTkyMn0.gtvl8xfz6a6axkn7OYsmZVGubIiVY5QRCWBiNY2oUwU';

  const params = new URLSearchParams(location.search);
  const courseCode = params.get('course');
  let currentParticipantId = null;

  // 効果音（Web Audio API）
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playStampSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  function playSuccessSound() {
    try {
      const ctx = getAudioCtx();
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        const start = ctx.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0.2, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + 0.3);
        osc.start(start);
        osc.stop(start + 0.3);
      });
    } catch(e) {}
  }

  function playAchievementSound() {
    try {
      const ctx = getAudioCtx();
      const notes = [523, 659, 784, 1047, 1319];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'triangle';
        const start = ctx.currentTime + i * 0.1;
        gain.gain.setValueAtTime(0.25, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + 0.4);
        osc.start(start);
        osc.stop(start + 0.4);
      });
    } catch(e) {}
  }

  function launchConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#FF6B35','#FFD700','#4ECDC4','#FF69B4','#7B68EE','#48BB78','#FF4500'];
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        piece.style.width = (Math.random() * 10 + 5) + 'px';
        piece.style.height = piece.style.width;
        piece.style.animation = `confettiFall ${Math.random() * 2 + 1.5}s ease forwards`;
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        container.appendChild(piece);
        setTimeout(() => piece.remove(), 3000);
      }, Math.random() * 300);
    }
  }

  async function init() {
    if (!courseCode) { document.getElementById('courseName').textContent = 'エラー：講座が見つかりません'; return; }
    const res = await fetch(`${SUPABASE_URL}/rest/v1/courses?course_code=eq.${courseCode}&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    const courses = await res.json();
    if (courses && courses.length > 0) {
      document.getElementById('courseName').textContent = courses[0].course_name;
      document.getElementById('stampIcon').textContent = '🎪';
    }
    const savedNickname = localStorage.getItem('stamp_nickname');
    if (savedNickname) {
      document.getElementById('savedNicknameDisplay').textContent = savedNickname + ' さん';
      document.getElementById('confirmSection').style.display = 'block';
    } else {
      document.getElementById('inputSection').style.display = 'block';
    }
  }

  function showInputSection() {
    document.getElementById('confirmSection').style.display = 'none';
    document.getElementById('inputSection').style.display = 'block';
  }

  async function stampWithSaved() {
    // はんこアニメーション
    const icon = document.getElementById('stampIcon');
    icon.classList.add('stamping');
    playStampSound();
    const ink = document.getElementById('inkEffect');
    ink.style.display = 'block';
    setTimeout(() => { ink.style.display = 'none'; icon.classList.remove('stamping'); }, 600);
    await doStamp(localStorage.getItem('stamp_nickname'));
  }

  async function stampWithInput() {
    const nickname = document.getElementById('nicknameInput').value.trim();
    if (!nickname) return;
    const icon = document.getElementById('stampIcon');
    icon.classList.add('stamping');
    playStampSound();
    const ink = document.getElementById('inkEffect');
    ink.style.display = 'block';
    setTimeout(() => { ink.style.display = 'none'; icon.classList.remove('stamping'); }, 600);
    await doStamp(nickname);
  }

  async function doStamp(nickname) {
    const errorDiv = document.getElementById('stampError');
    const loading = document.getElementById('stampLoading');
    errorDiv.style.display = 'none';
    loading.style.display = 'block';

    const pRes = await fetch(`${SUPABASE_URL}/rest/v1/participants?nickname=eq.${encodeURIComponent(nickname)}&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    const participants = await pRes.json();

    if (!participants || participants.length === 0) {
      loading.style.display = 'none';
      errorDiv.style.display = 'block';
      errorDiv.textContent = 'そのニックネームは登録されていません。';
      showInputSection();
      return;
    }

    const participant = participants[0];
    currentParticipantId = participant.id;

    const dupRes = await fetch(
      `${SUPABASE_URL}/rest/v1/stamps?participant_id=eq.${participant.id}&course_code=eq.${courseCode}&select=id`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    const dupStamps = await dupRes.json();

    if (dupStamps && dupStamps.length > 0) {
      loading.style.display = 'none';
      document.getElementById('confirmSection').style.display = 'none';
      document.getElementById('inputSection').style.display = 'none';
      document.getElementById('alreadyCourseName').textContent = document.getElementById('courseName').textContent;
      document.getElementById('alreadyScreen').style.display = 'block';
      document.getElementById('mainCard').classList.add('already');
      return;
    }

    const sRes = await fetch(`${SUPABASE_URL}/rest/v1/stamps`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ participant_id: participant.id, course_code: courseCode, stamped_at: new Date().toISOString() })
    });

    loading.style.display = 'none';

    if (sRes.ok) {
      const countRes = await fetch(`${SUPABASE_URL}/rest/v1/stamps?participant_id=eq.${participant.id}&select=id`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
      const allStamps = await countRes.json();
      const count = allStamps.length;
      localStorage.setItem('stamp_nickname', nickname);

      document.getElementById('confirmSection').style.display = 'none';
      document.getElementById('inputSection').style.display = 'none';

      // 成功画面
      const stamps = ['🌟','⭐','💫','✨','🎯','🏅','🎖️'];
      document.getElementById('successStampIcon').textContent = stamps[Math.floor(Math.random() * stamps.length)];
      document.getElementById('successText').textContent = nickname + 'さん、スタンプゲット！';
      document.getElementById('stampCountBadge').textContent = count + '個 🌟';

      // 達成バナー
      const banner = document.getElementById('achievementBanner');
      if (count === 3) {
        banner.innerHTML = '<div class="achievement-banner achievement-3"><div class="achievement-icon">🎁</div><div class="achievement-text">3個達成おめでとう！</div><div class="achievement-sub">受付でプレゼントをもらってね！</div></div>';
        playAchievementSound();
        launchConfetti();
      } else if (count === 5) {
        banner.innerHTML = '<div class="achievement-banner achievement-5"><div class="achievement-icon">🏆</div><div class="achievement-text">5個達成！スペシャル！</div><div class="achievement-sub">スペシャルプレゼントをもらってね！</div></div>';
        playAchievementSound();
        launchConfetti();
      } else {
        banner.innerHTML = '';
        let sub = count < 3 ? 'あと' + (3 - count) + '個でプレゼント！' : 'あと' + (5 - count) + '個でスペシャルプレゼント！';
        document.getElementById('successSub').textContent = sub;
        playSuccessSound();
      }

      document.getElementById('successScreen').style.display = 'block';
    }
  }

  function goMypage() { location.href = `mypage.html?id=${currentParticipantId}`; }

  function resetScreen() {
    document.getElementById('alreadyScreen').style.display = 'none';
    document.getElementById('mainCard').classList.remove('already');
    const savedNickname = localStorage.getItem('stamp_nickname');
    if (savedNickname) {
      document.getElementById('confirmSection').style.display = 'block';
      document.getElementById('inputSection').style.display = 'none';
    } else {
      document.getElementById('confirmSection').style.display = 'none';
      document.getElementById('inputSection').style.display = 'block';
    }
  }
  init();
</script>
</body>
</html>
